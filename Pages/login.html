<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <link rel="stylesheet" href="../Styles/login.css">
</head>

<body>

    <div class="container">

        <!-- Logo -->

        <div class="logo">

            <img src="https://images.icon-icons.com/1043/PNG/512/social_media_icons_flat_shadow_set_512x512_0000_facebook_icon-icons.com_76449.png"
                alt="Facebook Logo">

        </div>

        <!-- Bottom Text -->

        <div class="bottom-text">

            <p>Explore</p>
            <p>the things</p>
            <p class="third">you love.</p>

        </div>

        <!-- Left Side -->

        <div class="left-area">

            <img src="https://static.xx.fbcdn.net/rsrc.php/yb/r/HpEiFYDux5j.webp"
                alt="Facebook Illustration">

        </div>

        <!-- Right Side -->

        <div class="right-area">

            <div class="loginForm">

                <h2>Log in to Facebook</h2>

                <!-- Email -->

                <div class="email-address">

                    <div class="inputBox">

                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="Mobile number or email address">

                    </div>

                </div>

                <!-- Password -->

                <div class="email-address">

                    <div class="inputBox">

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Password">

                    </div>

                </div>

                <!-- Buttons -->

                <div class="btnBox">

                    <button
                        id="login"
                        onclick="login()">

                        Login

                    </button>

                    <button
                        id="already-account"
                        type="button">

                        Forgot Password?

                    </button>

                    <br>
                    <br>

                    <a href="register.html">

                        <button
                            type="button"
                            id="already-account-2">

                            Create New Account

                        </button>

                    </a>

                </div>

                <!-- Footer -->

                <div class="footer-section">

                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Meta-Logo.png"
                        alt="Meta Logo"
                        height="60">

                </div>

            </div>

        </div>

    </div>

    <script src="../Scripts/app.js"></script>

</body>

</html>
